services:
  web:
    image: langai-web
    container_name: langai-web
    restart: unless-stopped
    env_file:
      - .env
      - apps/web/.env.local
    environment:
      DATABASE_URL: postgresql://langai_user:langai_secure_2026@shared-postgres:5432/langai
      NEXTAUTH_URL: https://linguaflow.aureonforge.com
      NODE_ENV: production
    ports:
      - '3002:3002'
    networks:
      - default
      - shared

networks:
  default:
  shared:
    external: true
