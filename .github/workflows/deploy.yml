name: Deploy to Hostinger VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        working-directory: apps/web

      - name: Build Next.js
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXTAUTH_URL: https://linguaflow.aureonforge.com
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          NODE_ENV: production
        run: npm run build
        working-directory: apps/web

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 2222
          envs: DATABASE_URL,NEXTAUTH_URL,NEXTAUTH_SECRET,OPENAI_API_KEY
          script: |
            set -e

            # Setup app directory
            cd /var/www/langai 2>/dev/null || (mkdir -p /var/www/langai && cd /var/www/langai)

            # Pull latest code
            if [ ! -d ".git" ]; then
              git clone https://github.com/nauvalZulfikar/LangAI.git .
            else
              git pull origin main
            fi

            # Write env file (envs passed via appleboy envs param)
            cat > apps/web/.env.production << EOF
            DATABASE_URL=${DATABASE_URL}
            NEXTAUTH_URL=${NEXTAUTH_URL}
            NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
            OPENAI_API_KEY=${OPENAI_API_KEY}
            NODE_ENV=production
            EOF

            # Install dependencies
            cd apps/web
            npm ci --production=false

            # Run DB migrations
            npx prisma db push

            # Build
            npm run build

            # Restart PM2
            cd /var/www/langai
            pm2 describe langai > /dev/null 2>&1 && pm2 restart langai || pm2 start ecosystem.config.js --env production

            # Save PM2 process list
            pm2 save

            echo "Deploy successful!"
